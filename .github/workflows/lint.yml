name: Linting and Code Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '18'

jobs:
  frontend-lint:
    name: Frontend - ESLint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: cd frontend && npm install
      
      - name: Run ESLint
        run: cd frontend && npm run lint
        continue-on-error: false

  backend-syntax:
    name: Backend - Syntax Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Check server.js syntax
        run: |
          cd backendjs
          node -c server.js
          echo "✓ server.js syntax is valid"
      
      - name: Check all JavaScript files
        run: |
          cd backendjs
          for file in $(find src -name "*.js" 2>/dev/null); do
            node -c "$file" || exit 1
            echo "✓ $file syntax is valid"
          done
          echo "✓ All backend files have valid syntax"
        continue-on-error: true

  dependency-check:
    name: Dependency Security Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Check frontend dependencies
        run: |
          cd frontend
          npm install
          npm audit --audit-level=moderate || true
        continue-on-error: true
      
      - name: Check backend dependencies
        run: |
          cd backendjs
          npm install
          npm audit --audit-level=moderate || true
        continue-on-error: true
